<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcraft Tool Priority Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #0f172a; color: #e2e8f0; }
    .card { background: #1e293b; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    label { display: block; margin-top: .5rem; font-weight: 600; }
    input, textarea { width: 100%; margin-top: .25rem; padding: .5rem; border-radius: 6px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
    button { margin-top: 1rem; padding: .6rem 1rem; border: none; border-radius: 6px; background: #22c55e; color: #052e16; font-weight: 700; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border-bottom: 1px solid #334155; padding: .5rem; text-align: left; }
    pre { white-space: pre-wrap; background: #0b1220; padding: 1rem; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Bitcraft Tool Upgrade Priority Tracker</h1>

  <div class="card">
    <label>Claim ID <input id="claimId" placeholder="claim-123" /></label>
    <label>API key (optional) <input id="apiKey" type="password" /></label>
    <label>API base URL <input id="apiBaseUrl" value="https://bitjita.com" /></label>
    <label>App identifier header <input id="appIdentifier" value="Bitcraft Tool Priority Tracker" /></label>
    <label>Top active professions <input id="topProfessions" type="number" value="3" min="1" /></label>
    <label>Historical snapshot JSON (optional, paste previous snapshot file)</label>
    <textarea id="historical" rows="8" placeholder='{"claim_id": "...", "players": [...]}'></textarea>
    <button id="runBtn">Run Tracking</button>
  </div>

  <div class="card">
    <h2>Priority Report</h2>
    <div id="report"></div>
  </div>

  <div class="card">
    <h2>Players & Tools</h2>
    <div id="playersTools"></div>
  </div>

  <div class="card">
    <h2>Current Snapshot JSON</h2>
    <pre id="snapshot"></pre>
  </div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const reportEl = document.getElementById('report');
    const playersToolsEl = document.getElementById('playersTools');
    const snapshotEl = document.getElementById('snapshot');

    runBtn.addEventListener('click', async () => {
      reportEl.innerHTML = 'Loading...';
      playersToolsEl.innerHTML = '';
      snapshotEl.textContent = '';

      let historical = null;
      const rawHistorical = document.getElementById('historical').value.trim();
      if (rawHistorical) {
        try {
          historical = JSON.parse(rawHistorical);
        } catch (e) {
          reportEl.textContent = 'Historical snapshot JSON is invalid.';
          return;
        }
      }

      const payload = {
        claim_id: document.getElementById('claimId').value.trim(),
        api_key: document.getElementById('apiKey').value.trim() || null,
        api_base_url: document.getElementById('apiBaseUrl').value.trim(),
        app_identifier: document.getElementById('appIdentifier').value.trim() || 'Bitcraft Tool Priority Tracker',
        top_professions: Number(document.getElementById('topProfessions').value || '3'),
        historical_snapshot: historical,
      };

      let res, data;
      try {
        res = await fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        data = await res.json();
      } catch (e) {
        reportEl.textContent = 'Network error: ' + e.message;
        return;
      }

      if (!res.ok) {
        reportEl.textContent = data.error || 'Request failed';
        return;
      }

      snapshotEl.textContent = JSON.stringify(data.current_snapshot, null, 2);

      const players = (data.current_snapshot && Array.isArray(data.current_snapshot.players))
        ? data.current_snapshot.players
        : [];

      if (!players.length) {
        playersToolsEl.textContent = 'No players found in current snapshot.';
      } else {
        const playersTable = document.createElement('table');
        const playersHead = document.createElement('thead');
        playersHead.innerHTML = '<tr><th>Player</th><th>Tools</th></tr>';
        playersTable.appendChild(playersHead);
        const playersBody = document.createElement('tbody');

        for (const player of players) {
          const tr = document.createElement('tr');

          const playerNameTd = document.createElement('td');
          playerNameTd.textContent = String(player.name || player.player_id || 'unknown');
          tr.appendChild(playerNameTd);

          const toolsTd = document.createElement('td');
          const tools = Array.isArray(player.tools) ? player.tools : [];
          toolsTd.textContent = tools.length ? tools.join(', ') : 'none';
          tr.appendChild(toolsTd);

          playersBody.appendChild(tr);
        }

        playersTable.appendChild(playersBody);
        playersToolsEl.innerHTML = '';
        playersToolsEl.appendChild(playersTable);
      }

      if (!data.report) {
        reportEl.textContent = 'No historical snapshot supplied, so no priority report was generated. Current players and tools are shown above.';
        return;
      }

      const rows = data.report;
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      thead.innerHTML = '<tr><th>Priority</th><th>Player</th><th>XP Gain</th><th>Active Professions</th><th>Suggested Tools</th></tr>';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      for (const row of rows) {
        const tr = document.createElement('tr');
        const cells = [
          String(row.priority_rank),
          String(row.player_name),
          String(row.xp_gain_total),
          (row.active_professions || []).join(', ') || 'none',
          (row.suggested_tools || []).join(', ') || 'none',
        ];
        for (const text of cells) {
          const td = document.createElement('td');
          td.textContent = text;
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      reportEl.innerHTML = '';
      reportEl.appendChild(table);
    });
  </script>
</body>
</html>
